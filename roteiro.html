<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="pageTitle">Roteiro · Rota dos Quilombos</title>
  <meta name="description" content="Roteiro de turismo quilombola no Médio Jequitinhonha." id="pageDesc" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header" id="header">
    <div class="container header__inner">
      <a href="index.html" class="brand">
        <span class="brand__name">Rota dos <em>Quilombos</em></span>
        <span class="brand__tagline">Médio Jequitinhonha · MG</span>
      </a>
      <nav class="nav">
        <ul class="nav__list">
          <li><a href="index.html#comunidades" class="nav__link">Comunidades</a></li>
          <li><a href="roteiros.html" class="nav__link">Roteiros</a></li>
          <li><a href="index.html#saberes" class="nav__link">Saberes</a></li>
          <li><a href="index.html#para-quem" class="nav__link">Para Empresas</a></li>
          <li><a href="index.html#contato" class="nav__link">Contato</a></li>
        </ul>
        <div class="lang">
          <span class="lang__option lang__option--active">PT</span>
          <span class="lang__divider">|</span>
          <span class="lang__option">EN</span>
        </div>
      </nav>
      <div class="header__cta">
        <a href="roteiros.html" class="btn btn--gold">Ver Roteiros</a>
        <button class="menu-toggle" aria-label="Abrir menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main id="roteiroRoot"></main>

  <footer class="footer">
    <div class="container">
      <div class="footer__bottom" style="padding-top:0; border-top:none;">
        <span>© 2026 Rota dos Quilombos · Nzinga Turismo</span>
        <a href="roteiros.html" style="color: var(--dourado-fosco); font-size: 0.85rem;">← Ver todos os roteiros</a>
      </div>
    </div>
  </footer>

  <script src="data/roteiros.js"></script>
  <script src="data/comunidades.js"></script>
  <script>
    (function () {
      const root = document.getElementById('roteiroRoot');
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');
      const ALL = window.ROTEIROS || {};
      const r = ALL[slug];

      if (!r) {
        root.innerHTML = `
          <section class="page-hero">
            <div class="page-hero__bg" style="background:linear-gradient(135deg,#1A1612,#0E0E0E);"></div>
            <div class="container page-hero__content">
              <p class="breadcrumb"><a href="index.html">Início</a> · Roteiro não encontrado</p>
              <h1 class="page-hero__title">Roteiro não encontrado</h1>
            </div>
          </section>
          <section class="section section--osso">
            <div class="container" style="text-align:center;">
              <a href="roteiros.html" class="btn btn--outline">← Ver todos os roteiros</a>
            </div>
          </section>
        `;
        return;
      }

      document.getElementById('pageTitle').textContent = `${r.nome} · Rota dos Quilombos`;
      document.getElementById('pageDesc').setAttribute('content', `${r.nome} — ${r.duracao}. ${r.subtitulo}`);

      // Quick facts band
      const facts = [
        { label: 'Duração', value: r.duracaoCurta || r.duracao },
        { label: 'Investimento', value: r.preco.replace(/A partir de\s*/, '').replace('R$ ', 'R$ '), accent: true },
        { label: 'Grupo', value: r.grupo ? r.grupo.split('(')[0].trim() : 'Até 6 pessoas' },
        { label: 'Município', value: r.municipio },
        { label: 'Nível', value: (r.nivel || 'Leve').split('·')[0].trim() }
      ];

      // Itinerário cards
      const itinerarioCards = (r.itinerario || []).map((it, i) => `
        <article class="itinerario-card">
          <div class="itinerario-card__num">
            <span class="itinerario-card__num-label">Etapa</span>
            <span class="itinerario-card__num-val">${String(i + 1).padStart(2, '0')}</span>
          </div>
          <div class="itinerario-card__body">
            <h3 class="itinerario-card__title">${it.periodo}</h3>
            <p class="itinerario-card__text">${it.atividades}</p>
          </div>
        </article>
      `).join('');

      // Ícones SVG pra inclui (mapeados por palavra-chave)
      const iconFor = (txt) => {
        const t = txt.toLowerCase();
        if (/monitor|guia|agente|local/.test(t)) return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>`;
        if (/refeição|refeições|almoço|jantar|café|comida/.test(t)) return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 4v8a3 3 0 003 3v6M11 4l-1 8M11 4l1 8M19 4v6c0 2-1 3-2 3v8"/></svg>`;
        if (/oficina|tear|cesta|barro|tambor/.test(t)) return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2v20M5 6l14 12M19 6L5 18"/></svg>`;
        if (/transfer|transporte|veículo/.test(t)) return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="8" width="18" height="10" rx="2"/><circle cx="7" cy="20" r="2"/><circle cx="17" cy="20" r="2"/><path d="M3 13h18"/></svg>`;
        if (/pernoite|hospedagem|pousada|receptivo/.test(t)) return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 11l9-8 9 8v9a1 1 0 01-1 1h-4v-7H8v7H4a1 1 0 01-1-1z"/></svg>`;
        if (/material|degustação/.test(t)) return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="6" width="16" height="14" rx="1"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>`;
        if (/documenta|certificado|relatório/.test(t)) return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M8 13h8M8 17h6"/></svg>`;
        if (/encontro|workshop|pré/.test(t)) return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>`;
        return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 12l5 5 9-11"/></svg>`;
      };

      const incluiCards = (r.inclui || []).map((i) => {
        const titulo = i.split(/[\(:]/)[0].trim();
        const detalhe = i.includes('(') ? i.split('(')[1].replace(')', '').trim() : (i.includes(':') ? i.split(':')[1].trim() : '');
        return `
          <div class="inclui-tile">
            <div class="inclui-tile__icon">${iconFor(i)}</div>
            <div class="inclui-tile__body">
              <p class="inclui-tile__title">${titulo}</p>
              ${detalhe ? `<p class="inclui-tile__detail">${detalhe}</p>` : ''}
            </div>
          </div>
        `;
      }).join('');

      const naoIncluiList = (r.naoInclui || []).map((i) =>
        `<li>${i}</li>`
      ).join('');

      const comunidadesChips = (r.comunidades || []).map((c) =>
        `<span class="roteiro-chip">${c}</span>`
      ).join('');

      const destaqueHTML = r.destaque
        ? `<span class="roteiro-destaque">★ ${r.destaque}</span>`
        : '';

      // Outros roteiros (3 aleatórios diferentes do atual)
      const outrosSlugs = Object.keys(ALL).filter((s) => s !== slug);
      const outrosShuffled = outrosSlugs.sort(() => Math.random() - 0.5).slice(0, 3);
      const outrosCards = outrosShuffled.map((s) => {
        const o = ALL[s];
        return `
          <a href="roteiro.html?slug=${s}" class="outro-roteiro">
            <div class="outro-roteiro__image">
              <img src="${o.img}" alt="${o.nome}" loading="lazy" />
              <span class="outro-roteiro__duration">${o.duracaoCurta}</span>
            </div>
            <div class="outro-roteiro__body">
              <h3 class="outro-roteiro__name">${o.nome}</h3>
              <p class="outro-roteiro__sub">${o.subtitulo}</p>
              <span class="outro-roteiro__cta">Ver detalhes →</span>
            </div>
          </a>
        `;
      }).join('');

      root.innerHTML = `
        <!-- HERO DO ROTEIRO -->
        <section class="page-hero roteiro-hero">
          <div class="page-hero__bg">
            <img src="${r.img}" alt="${r.nome}" />
          </div>
          <div class="container page-hero__content">
            <p class="breadcrumb"><a href="index.html">Início</a> · <a href="roteiros.html">Roteiros</a> · ${r.duracaoCurta}</p>
            ${destaqueHTML}
            <h1 class="page-hero__title">${r.nome}</h1>
            <p class="page-hero__subtitle">${r.subtitulo}</p>
          </div>
        </section>

        <!-- QUICK FACTS BAND -->
        <section class="quick-facts">
          <div class="container">
            <div class="quick-facts__row">
              ${facts.map((f) => `
                <div class="quick-fact ${f.accent ? 'quick-fact--accent' : ''}">
                  <span class="quick-fact__label">${f.label}</span>
                  <span class="quick-fact__value">${f.value}</span>
                </div>
              `).join('')}
            </div>
          </div>
        </section>

        <!-- LAYOUT 2/3 + 1/3 sticky -->
        <section class="roteiro-body">
          <div class="container">
            <div class="roteiro-layout">

              <!-- CONTEÚDO PRINCIPAL -->
              <div class="roteiro-content">

                <!-- DESCRIÇÃO -->
                <div class="roteiro-block">
                  <span class="eyebrow">Sobre o roteiro</span>
                  <h2 class="roteiro-block__title">${r.subtitulo}</h2>
                  <p class="roteiro-block__lead">${r.descricao}</p>
                  ${comunidadesChips ? `
                    <div class="roteiro-chips" style="margin-top: var(--space-6);">
                      <span class="roteiro-chips__label">Comunidades visitadas</span>
                      <div class="roteiro-chips__list">${comunidadesChips}</div>
                    </div>
                  ` : ''}
                </div>

                <!-- ITINERÁRIO -->
                ${itinerarioCards ? `
                <div class="roteiro-block">
                  <span class="eyebrow">Itinerário</span>
                  <h2 class="roteiro-block__title">Como será cada parte da jornada.</h2>
                  <div class="itinerario-cards">${itinerarioCards}</div>
                </div>
                ` : ''}

                <!-- O QUE INCLUI -->
                <div class="roteiro-block">
                  <span class="eyebrow" style="color: var(--verde-folha);">Incluído na sua experiência</span>
                  <h2 class="roteiro-block__title">Tudo isso vem junto.</h2>
                  <div class="inclui-tiles">${incluiCards}</div>

                  ${naoIncluiList ? `
                  <div class="nao-inclui">
                    <p class="nao-inclui__label">Não está incluído:</p>
                    <ul>${naoIncluiList}</ul>
                  </div>
                  ` : ''}
                </div>

                <!-- INFO LOGÍSTICA -->
                <div class="roteiro-block">
                  <span class="eyebrow">Antes de viajar</span>
                  <h2 class="roteiro-block__title">O que saber.</h2>
                  <div class="info-grid">
                    <div class="info-card">
                      <span class="info-card__label">Tamanho do grupo</span>
                      <p class="info-card__value">${r.grupo}</p>
                    </div>
                    <div class="info-card">
                      <span class="info-card__label">Melhor época</span>
                      <p class="info-card__value">${r.melhorEpoca}</p>
                    </div>
                    <div class="info-card">
                      <span class="info-card__label">Nível</span>
                      <p class="info-card__value">${r.nivel}</p>
                    </div>
                    <div class="info-card">
                      <span class="info-card__label">Pagamento</span>
                      <p class="info-card__value">PIX, transferência ou espécie nas comunidades</p>
                    </div>
                  </div>
                </div>

              </div>

              <!-- SIDEBAR STICKY -->
              <aside class="roteiro-sidebar">
                <div class="roteiro-sidebar__inner">
                  <div class="roteiro-sidebar__image">
                    <img src="${r.img}" alt="${r.nome}" />
                    <span class="roteiro-sidebar__tag">${r.duracaoCurta}</span>
                  </div>
                  <div class="roteiro-sidebar__body">
                    <span class="roteiro-sidebar__price-label">Investimento</span>
                    <span class="roteiro-sidebar__price">${r.preco}</span>
                    <p class="roteiro-sidebar__price-note">Por pessoa · grupos privativos sob consulta</p>

                    <button class="btn btn--gold btn--icon roteiro-sidebar__cta" data-cotacao
                      data-context="roteiro"
                      data-item="${r.nome} (${r.duracao})"
                      data-eyebrow="Solicitar Cotação"
                      data-title="Cotar <em>${r.nome}</em>"
                      data-subtitle="Conte a data desejada e quantas pessoas. Respondemos em até 1 dia útil.">Solicitar Cotação</button>

                    <a href="https://wa.me/5531900000000?text=${encodeURIComponent('Olá! Tenho interesse no roteiro ' + r.nome)}" target="_blank" class="roteiro-sidebar__whats">
                      <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M17.6 6.3A8 8 0 006.3 17.7l-1.3 4 4-1.3a8 8 0 008.6-13.5zm-5.6 12.3a6.6 6.6 0 01-3.4-1l-2.4.7.7-2.3a6.6 6.6 0 113 5l2.1.6zm3.6-4.6c-.2-.1-1.2-.6-1.4-.7-.2-.1-.3-.1-.5.1l-.7.8c-.1.2-.2.2-.5.1a5.4 5.4 0 01-2.7-2.4c-.2-.3 0-.4.1-.6l.4-.5.2-.4v-.4c-.1-.2-.5-1.2-.7-1.6-.2-.4-.4-.4-.5-.4h-.5c-.2 0-.4.1-.6.3a2 2 0 00-.7 1.5c0 .9.7 1.8.8 1.9.1.2 1.5 2.3 3.7 3.2.5.2.9.3 1.2.4.5.2 1 .1 1.4.1.4 0 1.2-.5 1.4-1 .2-.5.2-.9.1-1z"/></svg>
                      ou pelo WhatsApp
                    </a>

                    <div class="roteiro-sidebar__divider"></div>

                    <ul class="roteiro-sidebar__meta">
                      <li><strong>Duração:</strong> ${r.duracao}</li>
                      <li><strong>Município:</strong> ${r.municipio}</li>
                      <li><strong>Comunidades:</strong> ${(r.comunidades || []).join(', ')}</li>
                    </ul>
                  </div>
                </div>
              </aside>

            </div>
          </div>
        </section>

        <!-- BARRA STICKY MOBILE -->
        <div class="mobile-cotar-bar">
          <div class="mobile-cotar-bar__price">
            <small>${r.duracaoCurta}</small>
            <strong>${r.preco}</strong>
          </div>
          <button class="btn btn--gold" data-cotacao
            data-context="roteiro"
            data-item="${r.nome} (${r.duracao})"
            data-eyebrow="Solicitar Cotação"
            data-title="Cotar <em>${r.nome}</em>"
            data-subtitle="Conte a data desejada e quantas pessoas.">Cotar</button>
        </div>

        <!-- CTA FINAL -->
        <section class="cta-final" id="cotacao">
          <div class="container cta-final__inner">
            <h2 class="cta-final__title">Pronto para viver<br /><em>${r.nome}?</em></h2>
            <p class="cta-final__subtitle">${r.preco} · ${r.duracao} · ${r.municipio}</p>
            <button class="btn btn--gold btn--large btn--icon" data-cotacao
              data-context="roteiro"
              data-item="${r.nome} (${r.duracao})"
              data-eyebrow="Solicitar Cotação"
              data-title="Cotar <em>${r.nome}</em>"
              data-subtitle="Vivência guiada por Agente Local. Conte a data desejada e quantas pessoas.">Solicitar Cotação</button>
          </div>
        </section>

        <!-- OUTROS ROTEIROS -->
        ${outrosCards ? `
        <section class="section section--osso outros-section">
          <div class="container">
            <div class="comunidades__header" style="max-width: 680px; margin-bottom: var(--space-8);">
              <span class="eyebrow">Outros caminhos</span>
              <h2 class="section-title">Conheça <em>outras vivências</em>.</h2>
            </div>
            <div class="outros-grid">${outrosCards}</div>
            <div style="text-align:center; margin-top: var(--space-8);">
              <a href="roteiros.html" class="btn btn--outline">Ver todos os 10 roteiros →</a>
            </div>
          </div>
        </section>
        ` : ''}
      `;
    })();
  </script>
  <script src="assets/js/main.js"></script>
</body>
</html>
